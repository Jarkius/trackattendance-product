<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=475, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Mobile Dashboard Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 475px;
    height: 780px;
    overflow: hidden;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .phone {
    width: 395px;
    height: 740px;
    background: #000;
    border-radius: 44px;
    padding: 12px;
    position: relative;
    box-shadow: 0 25px 60px rgba(0,0,0,0.5), inset 0 0 0 2px rgba(255,255,255,0.1);
  }
  .notch {
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 150px;
    height: 28px;
    background: #000;
    border-radius: 0 0 18px 18px;
    z-index: 10;
  }
  .screen {
    width: 100%;
    height: 100%;
    background: #0f172a;
    border-radius: 34px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .screen-content {
    flex: 1;
    padding: 52px 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    overflow: hidden;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .header-title { font-size: 22px; font-weight: 700; color: #f1f5f9; }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #22c55e;
    font-weight: 500;
    background: rgba(34,197,94,0.1);
    padding: 4px 10px;
    border-radius: 12px;
  }
  .live-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 6px rgba(34,197,94,0.6);
  }
  .big-stat {
    text-align: center;
    padding: 8px 0;
  }
  .big-number {
    font-size: 56px;
    font-weight: 700;
    color: #f1f5f9;
    line-height: 1;
  }
  .big-label {
    font-size: 14px;
    color: #64748b;
    margin-top: 4px;
  }
  .donut-section {
    display: flex;
    justify-content: center;
    position: relative;
  }
  .donut-container {
    position: relative;
    width: 120px;
    height: 120px;
  }
  .donut-text {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 24px;
    font-weight: 700;
    color: #f1f5f9;
  }
  .donut-sublabel {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, calc(-50% + 18px));
    font-size: 11px;
    color: #64748b;
  }
  .bars-section {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .bar-row {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .bar-header {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
  }
  .bar-label { color: #cbd5e1; font-weight: 500; }
  .bar-value { color: #94a3b8; }
  .bar-track {
    height: 8px;
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.3s;
  }
  .bar-green { background: #22c55e; }
  .bar-yellow { background: #eab308; }
  .bar-orange { background: #f97316; }
  .bottom-nav {
    height: 56px;
    background: #1e293b;
    display: flex;
    align-items: center;
    justify-content: space-around;
    border-top: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    font-size: 11px;
    color: #64748b;
  }
  .nav-item.active { color: #8B5CF6; }
  .nav-item svg { width: 20px; height: 20px; }
</style>
</head>
<body>
<div class="phone">
  <div class="notch"></div>
  <div class="screen">
    <div class="screen-content">
      <div class="header">
        <div class="header-title">Dashboard</div>
        <div class="live-badge"><div class="live-dot"></div> Live</div>
      </div>

      <div class="big-stat">
        <div class="big-number">487</div>
        <div class="big-label">Total Scans</div>
      </div>

      <div class="donut-section">
        <div class="donut-container">
          <svg viewBox="0 0 120 120" width="120" height="120">
            <circle cx="60" cy="60" r="50" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="10"/>
            <circle cx="60" cy="60" r="50" fill="none" stroke="#8B5CF6" stroke-width="10"
              stroke-dasharray="229.5 314.16"
              stroke-dashoffset="0"
              stroke-linecap="round"
              transform="rotate(-90 60 60)"/>
          </svg>
          <div class="donut-text">73%</div>
          <div class="donut-sublabel">On Time</div>
        </div>
      </div>

      <div class="bars-section">
        <div class="bar-row">
          <div class="bar-header">
            <span class="bar-label">Engineering</span>
            <span class="bar-value">85%</span>
          </div>
          <div class="bar-track"><div class="bar-fill bar-green" style="width:85%"></div></div>
        </div>
        <div class="bar-row">
          <div class="bar-header">
            <span class="bar-label">Sales</span>
            <span class="bar-value">91%</span>
          </div>
          <div class="bar-track"><div class="bar-fill bar-green" style="width:91%"></div></div>
        </div>
        <div class="bar-row">
          <div class="bar-header">
            <span class="bar-label">HR</span>
            <span class="bar-value">78%</span>
          </div>
          <div class="bar-track"><div class="bar-fill bar-yellow" style="width:78%"></div></div>
        </div>
        <div class="bar-row">
          <div class="bar-header">
            <span class="bar-label">Marketing</span>
            <span class="bar-value">62%</span>
          </div>
          <div class="bar-track"><div class="bar-fill bar-orange" style="width:62%"></div></div>
        </div>
      </div>
    </div>

    <div class="bottom-nav">
      <div class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a4 4 0 0 0-8 0v2"/></svg>
        Stations
      </div>
      <div class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Export
      </div>
    </div>
  </div>
</div>
</body>
</html>
