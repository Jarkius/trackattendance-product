<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=600, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>Kiosk Mockup</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 600px;
    height: 450px;
    overflow: hidden;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: transparent;
  }
  .window {
    width: 600px;
    height: 450px;
    background: #0f172a;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
    display: flex;
    flex-direction: column;
  }
  .chrome {
    height: 40px;
    background: #1e293b;
    display: flex;
    align-items: center;
    padding: 0 14px;
    gap: 8px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red { background: #ef4444; }
  .dot-yellow { background: #eab308; }
  .dot-green { background: #22c55e; }
  .chrome-title {
    flex: 1;
    text-align: center;
    color: #94a3b8;
    font-size: 13px;
    font-weight: 500;
    margin-right: 52px;
  }
  .content {
    flex: 1;
    padding: 24px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .scan-row {
    display: flex;
    gap: 10px;
  }
  .scan-input {
    flex: 1;
    height: 44px;
    background: #1e293b;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 0 16px;
    color: #64748b;
    font-size: 14px;
    font-family: inherit;
    display: flex;
    align-items: center;
  }
  .scan-btn {
    height: 44px;
    padding: 0 24px;
    background: #8B5CF6;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
  }
  .result-card {
    background: #1e293b;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.06);
    padding: 24px;
    display: flex;
    gap: 20px;
    align-items: center;
  }
  .check-circle {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: rgba(34,197,94,0.12);
    border: 2px solid #22c55e;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .check-circle svg {
    width: 36px;
    height: 36px;
    stroke: #22c55e;
    stroke-width: 3;
    fill: none;
  }
  .info { display: flex; flex-direction: column; gap: 4px; }
  .info-name { font-size: 22px; font-weight: 700; color: #f1f5f9; }
  .info-dept { font-size: 14px; color: #8B5CF6; font-weight: 500; }
  .info-badge { font-size: 13px; color: #64748b; font-family: 'SF Mono', 'Fira Code', monospace; }
  .voice-bubble {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(139,92,246,0.1);
    border: 1px solid rgba(139,92,246,0.2);
    border-radius: 20px;
    padding: 8px 16px;
    color: #c4b5fd;
    font-size: 14px;
    align-self: flex-start;
  }
  .bottom-bar {
    margin-top: auto;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .stats { display: flex; gap: 20px; }
  .stat { font-size: 13px; color: #94a3b8; }
  .stat-value { font-weight: 700; color: #e2e8f0; }
  .status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: #22c55e;
    font-weight: 500;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    box-shadow: 0 0 6px rgba(34,197,94,0.5);
  }
</style>
</head>
<body>
<div class="window">
  <div class="chrome">
    <div class="dot dot-red"></div>
    <div class="dot dot-yellow"></div>
    <div class="dot dot-green"></div>
    <div class="chrome-title">TrackAttendance Kiosk — Gate A</div>
  </div>
  <div class="content">
    <div class="scan-row">
      <div class="scan-input">Scan badge or enter ID...</div>
      <button class="scan-btn">Scan</button>
    </div>
    <div class="result-card">
      <div class="check-circle">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div class="info">
        <div class="info-name">สมชาย วงศ์สวัสดิ์</div>
        <div class="info-dept">Engineering</div>
        <div class="info-badge">EMP-001</div>
      </div>
    </div>
    <div class="voice-bubble">
      <span style="font-size:18px;">&#x1F50A;</span>
      <span>"สวัสดีครับ คุณสมชาย"</span>
    </div>
    <div class="bottom-bar">
      <div class="stats">
        <div class="stat">Checked In: <span class="stat-value">47</span></div>
        <div class="stat">Pending: <span class="stat-value">0</span></div>
        <div class="stat">Synced: <span class="stat-value">47</span></div>
      </div>
      <div class="status">
        <div class="status-dot"></div>
        Online
      </div>
    </div>
  </div>
</div>
</body>
</html>
