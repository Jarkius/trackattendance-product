<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1d23">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Attendance Dashboard</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;500;700;900&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --green: #86BC25;
  --green-dim: #86BC2540;
  --green-glow: #86BC2520;
  --dark: #1a1d23;
  --surface: #22262e;
  --surface-up: #2a2f38;
  --border: #333940;
  --text: #e8eaed;
  --text-dim: #8b919a;
  --text-mute: #555b65;
  --danger: #e8443a;
  --radius: 14px;
}

html { font-size: 16px; }

body {
  font-family: 'Outfit', system-ui, sans-serif;
  background: var(--dark);
  color: var(--text);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ---- NOISE TEXTURE OVERLAY ---- */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 9999;
}

/* ---- TOP BAR ---- */
.topbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--dark);
  border-bottom: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.pulse-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  position: relative;
}

.pulse-dot::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s ease-out infinite;
}

.pulse-dot.error { background: var(--danger); }
.pulse-dot.error::after { background: var(--danger); }

@keyframes pulse {
  0% { opacity: 0.6; transform: scale(1); }
  100% { opacity: 0; transform: scale(2.5); }
}

.topbar-title {
  font-size: 0.8rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-dim);
}

.countdown {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-mute);
  letter-spacing: 0.05em;
}

/* ---- HERO STAT ---- */
.hero {
  padding: 32px 20px 24px;
  text-align: center;
  position: relative;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 20px;
  right: 20px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
}

.hero-label {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--text-mute);
  margin-bottom: 8px;
}

.hero-number {
  font-size: 5rem;
  font-weight: 900;
  line-height: 1;
  color: var(--green);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.03em;
  transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.hero-stats {
  margin-top: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0;
}

.hero-stat {
  flex: 1;
  text-align: center;
}

.hero-stat-value {
  font-family: 'DM Mono', monospace;
  font-size: 1.3rem;
  font-weight: 500;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}

.hero-stat-label {
  font-size: 0.6rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-mute);
  margin-top: 4px;
}

.hero-stat-divider {
  width: 1px;
  height: 32px;
  background: var(--border);
}

/* ---- SECTION ---- */
.section {
  padding: 20px;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.section-title {
  font-size: 0.7rem;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-mute);
}

.section-count {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
}

/* ---- STAT ROWS ---- */
.stat-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 8px;
  position: relative;
  overflow: hidden;
  transition: transform 0.2s ease;
}

.stat-row:active {
  transform: scale(0.985);
}

.stat-row-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.stat-name {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 70%;
  display: flex;
  align-items: center;
  gap: 8px;
}

.stat-name .status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.stat-status {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-mute);
  margin-left: auto;
  white-space: nowrap;
}

.stat-value {
  font-family: 'DM Mono', monospace;
  font-size: 0.95rem;
  font-weight: 500;
  color: var(--green);
  white-space: nowrap;
}

.stat-value.has-registered {
  font-size: 0.82rem;
}

.stat-value .stat-registered {
  color: var(--text-mute);
  font-size: 0.78rem;
}

.stat-pct {
  font-family: 'DM Mono', monospace;
  font-size: 0.62rem;
  color: var(--text-mute);
  margin-top: 6px;
  text-align: right;
}

.stat-bar-track {
  height: 4px;
  background: var(--surface-up);
  border-radius: 2px;
  overflow: hidden;
}

.stat-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), #a8d64a);
  border-radius: 2px;
  transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1);
  min-width: 2px;
}

/* ---- DONUT RING CHARTS ---- */
.ring-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 12px;
}

.ring-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 10px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  transition: transform 0.2s ease;
}

.ring-card:active { transform: scale(0.97); }

.ring-wrap {
  position: relative;
  width: 80px;
  height: 80px;
}

.ring-wrap svg {
  width: 100%;
  height: 100%;
  transform: rotate(-90deg);
}

.ring-track {
  fill: none;
  stroke: var(--surface-up);
  stroke-width: 7;
}

.ring-fill {
  fill: none;
  stroke-width: 7;
  stroke-linecap: round;
  transition: stroke-dashoffset 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

.ring-center {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.ring-pct {
  font-family: 'DM Mono', monospace;
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}

.ring-count {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--text-mute);
  margin-top: 2px;
}

.ring-label {
  font-size: 0.72rem;
  font-weight: 500;
  color: var(--text-dim);
  text-align: center;
  line-height: 1.2;
  max-width: 110px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ---- LIVE STATS PANEL ---- */
.live-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.live-stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  text-align: center;
}

.live-stat-card.wide {
  grid-column: 1 / -1;
}

.live-stat-value {
  font-family: 'DM Mono', monospace;
  font-size: 1.6rem;
  font-weight: 500;
  color: var(--green);
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.live-stat-value.dim { color: var(--text-mute); }

.live-stat-label {
  font-size: 0.65rem;
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-mute);
  margin-top: 6px;
}

.live-stat-sub {
  font-family: 'DM Mono', monospace;
  font-size: 0.6rem;
  color: var(--text-dim);
  margin-top: 4px;
}

/* Station balance bars */
.station-balance {
  display: flex;
  flex-direction: column;
  gap: 8px;
  padding: 4px 0;
}

.sbal-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.sbal-name {
  font-size: 0.75rem;
  color: var(--text-dim);
  min-width: 70px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
}

.sbal-track {
  flex: 1;
  height: 8px;
  background: var(--surface-up);
  border-radius: 4px;
  overflow: hidden;
}

.sbal-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  min-width: 2px;
}

.sbal-count {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-dim);
  min-width: 28px;
  text-align: right;
}

/* ---- EMPTY STATE ---- */
.empty {
  text-align: center;
  padding: 32px 20px;
  color: var(--text-mute);
  font-size: 0.85rem;
}

.empty-icon {
  font-size: 2rem;
  margin-bottom: 8px;
  opacity: 0.4;
}

/* ---- LOADING ---- */
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60dvh;
  gap: 16px;
}

.loader {
  width: 32px;
  height: 32px;
  border: 3px solid var(--surface-up);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  font-size: 0.8rem;
  color: var(--text-mute);
  letter-spacing: 0.05em;
}

/* ---- ERROR BANNER ---- */
.error-banner {
  margin: 12px 20px;
  padding: 10px 14px;
  background: #e8443a18;
  border: 1px solid #e8443a40;
  border-radius: 10px;
  font-size: 0.78rem;
  color: var(--danger);
  display: none;
  align-items: center;
  gap: 8px;
}

.error-banner.show { display: flex; }

/* ---- LAST UPDATED ---- */
.hero-footer {
  margin-top: 14px;
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  color: var(--text-mute);
  letter-spacing: 0.03em;
}

/* ---- FADE-IN ---- */
.fade-in {
  animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.delay-1 { animation-delay: 0.05s; }
.delay-2 { animation-delay: 0.1s; }
.delay-3 { animation-delay: 0.15s; }
.delay-4 { animation-delay: 0.2s; }
.delay-5 { animation-delay: 0.25s; }

/* ---- STATUS DOTS (used in station rows) ---- */
.status-dot.ready { background: var(--green); }
.status-dot.pending { background: #f5a623; }
.status-dot.offline { background: var(--danger); }

/* ---- DESKTOP ---- */
@media (min-width: 640px) {
  .hero-number { font-size: 6.5rem; }
  .section { max-width: 600px; margin: 0 auto; }
  .hero { max-width: 600px; margin: 0 auto; }
}

/* ---- WIDE / TV ---- */
@media (min-width: 1024px) {
  .hero-number { font-size: 8rem; }
  .hero-stat-value { font-size: 1.6rem; }
  .hero { max-width: 900px; margin: 0 auto; padding: 40px 20px 32px; }
  .section { max-width: 900px; margin-left: auto; margin-right: auto; }
  .sections-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 24px;
    max-width: 900px;
    margin: 0 auto;
  }
  .sections-grid .section { max-width: none; }
  .stat-name { font-size: 0.95rem; }
  .topbar { padding: 16px 24px; }
  .topbar-title { font-size: 0.85rem; }
  .ring-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  .timeline-chart { height: 130px; }
}

/* ---- LIGHT THEME ---- */
html.light {
  --dark: #f5f6f8;
  --surface: #ffffff;
  --surface-up: #e8eaef;
  --border: #dde0e5;
  --text: #1a1d23;
  --text-dim: #5a6270;
  --text-mute: #7a8290;
  --green-dim: #86BC2530;
  --green-glow: #86BC2515;
}
html.light body::before { opacity: 0; }
html.light .error-banner {
  background: #e8443a12;
  border-color: #e8443a30;
}

/* ---- PULL TO REFRESH ---- */
.ptr-indicator {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%) translateY(-44px);
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  transition: opacity 0.2s ease;
  opacity: 0;
  pointer-events: none;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
}
.ptr-indicator.visible { opacity: 1; }
.ptr-indicator.refreshing { opacity: 1; }
.ptr-indicator svg {
  width: 18px;
  height: 18px;
  color: var(--green);
}
.ptr-indicator.refreshing svg {
  animation: spin 0.8s linear infinite;
}

/* ---- THEME TOGGLE ---- */
.theme-toggle {
  width: 32px;
  height: 32px;
  border: none;
  background: var(--surface-up);
  border-radius: 8px;
  color: var(--text-dim);
  font-size: 1rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s, color 0.2s;
  -webkit-tap-highlight-color: transparent;
  margin-left: 12px;
  flex-shrink: 0;
}
.theme-toggle:active { transform: scale(0.9); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="pulse-dot" id="statusDot"></div>
    <span class="topbar-title">Attendance Dashboard</span>
  </div>
  <div style="display:flex;align-items:center;gap:4px">
    <span class="countdown" id="countdown">--</span>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">&#9790;</button>
  </div>
</div>

<div id="loadingScreen" class="loading-screen">
  <div class="loader"></div>
  <div class="loading-text">Connecting...</div>
</div>

<div class="ptr-indicator" id="ptrIndicator"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></div>

<div id="dashboard" style="display:none">
  <div class="error-banner" id="errorBanner">
    <span>&#9888;</span>
    <span id="errorText">Connection lost. Showing cached data.</span>
  </div>

  <div class="hero fade-in">
    <div class="hero-label">Attendance Rate</div>
    <div class="hero-number" id="heroRate">--</div>
    <div class="hero-stats">
      <div class="hero-stat">
        <div class="hero-stat-value" id="heroScanned">--</div>
        <div class="hero-stat-label">Unique</div>
      </div>
      <div class="hero-stat-divider"></div>
      <div class="hero-stat">
        <div class="hero-stat-value" id="heroTotalScans">--</div>
        <div class="hero-stat-label">Scans</div>
      </div>
      <div class="hero-stat-divider"></div>
      <div class="hero-stat">
        <div class="hero-stat-value" id="heroRegistered">--</div>
        <div class="hero-stat-label">Registered</div>
      </div>
    </div>
    <div class="hero-footer" id="footer">Last updated: --</div>
  </div>

  <div class="section fade-in delay-1">
    <div class="section-header">
      <span class="section-title">Business Units</span>
      <span class="section-count" id="buCount">0</span>
    </div>
    <div id="buRings" class="ring-grid"></div>
    <div class="empty" id="buEmpty" style="display:none">
      <div class="empty-icon">&#9632;</div>
      No business unit data yet
    </div>
  </div>

  <div class="section fade-in delay-2">
    <div class="section-header">
      <span class="section-title">Live Stats</span>
      <span class="section-count" id="liveLabel">realtime</span>
    </div>
    <div class="live-stats">
      <div class="live-stat-card">
        <div class="live-stat-value" id="scanRate">--</div>
        <div class="live-stat-label">Scans / min</div>
        <div class="live-stat-sub" id="scanRateSub"></div>
      </div>
      <div class="live-stat-card">
        <div class="live-stat-value" id="etaValue">--</div>
        <div class="live-stat-label">Est. Completion</div>
        <div class="live-stat-sub" id="etaSub"></div>
      </div>
      <div class="live-stat-card wide">
        <div class="live-stat-label" style="margin-top:0;margin-bottom:10px">Station Load</div>
        <div class="station-balance" id="stationBalance"></div>
        <div class="empty" id="stationEmpty" style="display:none;padding:12px">
          <div class="empty-icon">&#9723;</div>
          No station data yet
        </div>
      </div>
    </div>
  </div>


</div>

<script>
(function() {
  // ---- Theme ----
  function applyTheme(mode) {
    const isLight = mode === 'light' || (mode === 'auto' && window.matchMedia('(prefers-color-scheme: light)').matches);
    document.documentElement.classList.toggle('light', isLight);
    var mc = document.querySelector('meta[name="theme-color"]');
    if (mc) mc.setAttribute('content', isLight ? '#f5f6f8' : '#1a1d23');
    var btn = document.getElementById('themeToggle');
    if (btn) btn.innerHTML = isLight ? '&#9728;' : '&#9790;';
  }
  var themeMode = localStorage.getItem('theme') || 'auto';
  applyTheme(themeMode);
  window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', function() {
    if ((localStorage.getItem('theme') || 'auto') === 'auto') applyTheme('auto');
  });
  document.addEventListener('click', function(e) {
    if (e.target.closest('#themeToggle')) {
      var cur = localStorage.getItem('theme') || 'auto';
      // Cycle: auto → light → dark → auto
      var next = cur === 'auto' ? 'light' : cur === 'light' ? 'dark' : 'auto';
      localStorage.setItem('theme', next);
      themeMode = next;
      applyTheme(next);
    }
  });

  const API_URL = '../v1/dashboard/public/stats';
  const CONFIG_URL = '../v1/dashboard/public/config';

  // Refresh interval: fetched from API, 0 = manual pull-to-refresh only
  let POLL_INTERVAL = 60;  // default until config loads
  let countdown = POLL_INTERVAL;
  let timer = null;
  let lastData = null;
  let isFirstLoad = true;
  let consecutiveErrors = 0;
  let stationStatusMap = {};

  const $ = id => document.getElementById(id);

  function animateNumber(el, target) {
    const current = parseInt(el.textContent) || 0;
    if (current === target) return;
    const diff = target - current;
    const steps = Math.min(Math.abs(diff), 20);
    const stepTime = 400 / steps;
    let step = 0;
    const tick = () => {
      step++;
      const progress = step / steps;
      const eased = 1 - Math.pow(1 - progress, 3);
      el.textContent = Math.round(current + diff * eased).toLocaleString();
      if (step < steps) setTimeout(tick, stepTime);
    };
    tick();
  }

  function formatAgo(s) {
    if (s < 60) return s + 's ago';
    if (s < 3600) return Math.floor(s / 60) + 'm ago';
    return Math.floor(s / 3600) + 'h ago';
  }

  function renderRows(container, items, maxValue, useRegistered, statusMap) {
    const existing = container.children;
    items.forEach((item, i) => {
      const hasReg = useRegistered && item.registered > 0;
      const barMax = hasReg ? item.registered : maxValue;
      const pct = barMax > 0 ? Math.min(item.unique / barMax * 100, 100) : 0;
      let row = existing[i];
      if (!row) {
        row = document.createElement('div');
        row.className = 'stat-row fade-in delay-' + Math.min(i + 1, 5);
        row.innerHTML = `
          <div class="stat-row-top">
            <div class="stat-name"></div>
            <div class="stat-value"></div>
          </div>
          <div class="stat-bar-track">
            <div class="stat-bar-fill"></div>
          </div>`;
        container.appendChild(row);
      }
      const nameEl = row.querySelector('.stat-name');
      const displayName = (item.name === 'Unknown' ? '(Unmatched)' : item.name) || '(Unmatched)';
      const st = statusMap && statusMap[item.name];
      if (st) {
        var statusText = st.status === 'pending' ? 'Clearing...' :
          st.status === 'offline' ? 'Offline' : formatAgo(st.seconds_ago);
        nameEl.innerHTML = '<span class="status-dot ' + st.status + '"></span>' +
          displayName + '<span class="stat-status">' + statusText + '</span>';
      } else {
        nameEl.textContent = displayName;
      }
      const valEl = row.querySelector('.stat-value');
      if (hasReg) {
        valEl.classList.add('has-registered');
        valEl.innerHTML = item.unique.toLocaleString() +
          ' <span class="stat-registered">/ ' + item.registered.toLocaleString() + '</span>';
        // Percentage label — create or reuse
        let pctEl = row.querySelector('.stat-pct');
        if (!pctEl) {
          pctEl = document.createElement('div');
          pctEl.className = 'stat-pct';
          row.appendChild(pctEl);
        }
        pctEl.textContent = Math.round(pct) + '%';
      } else {
        valEl.classList.remove('has-registered');
        valEl.textContent = item.unique.toLocaleString();
        const pctEl = row.querySelector('.stat-pct');
        if (pctEl) pctEl.remove();
      }
      row.querySelector('.stat-bar-fill').style.width = Math.max(pct, 1) + '%';
    });
    // Remove extra rows
    while (container.children.length > items.length) {
      container.removeChild(container.lastChild);
    }
  }

  // Ring chart color palette
  const RING_COLORS = [
    '#86BC25', '#4CAF50', '#00BCD4', '#2196F3', '#9C27B0',
    '#FF9800', '#E91E63', '#607D8B', '#795548', '#CDDC39',
  ];

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderRings(container, items) {
    container.innerHTML = '';
    const CIRC = 2 * Math.PI * 33; // radius=33
    items.forEach((item, i) => {
      const displayName = (item.name === 'Unknown' || item.name === 'Unmatched') ? '(Unmatched)' : item.name;
      const hasReg = item.registered > 0;
      const pct = hasReg ? Math.min(item.unique / item.registered * 100, 100) : 0;
      const color = RING_COLORS[i % RING_COLORS.length];
      const offset = CIRC - (CIRC * pct / 100);

      const card = document.createElement('div');
      card.className = 'ring-card fade-in delay-' + Math.min(i + 1, 5);
      card.innerHTML = `
        <div class="ring-wrap">
          <svg viewBox="0 0 80 80">
            <circle class="ring-track" cx="40" cy="40" r="33"/>
            <circle class="ring-fill" cx="40" cy="40" r="33"
              stroke="${color}"
              stroke-dasharray="${CIRC}"
              stroke-dashoffset="${offset}"/>
          </svg>
          <div class="ring-center">
            <span class="ring-pct">${hasReg ? Math.round(pct) + '%' : item.unique}</span>
            <span class="ring-count">${item.unique}/${item.registered || '?'}</span>
          </div>
        </div>
        <div class="ring-label" title="${escapeHtml(displayName)}">${escapeHtml(displayName)}</div>`;
      container.appendChild(card);
    });
  }

  // Station balance: color by relative imbalance vs average
  function getSbalColor(unique, avg) {
    if (avg <= 0) return '#86BC25';
    const ratio = unique / avg;
    if (ratio >= 1.4) return '#e8443a';   // 40%+ above avg → red (overloaded)
    if (ratio >= 1.2) return '#f5a623';   // 20%+ above avg → orange (busy)
    return '#86BC25';                      // normal → green
  }

  function renderStationBalance(container, stations, totalScans) {
    container.innerHTML = '';
    if (!stations.length) return;
    const maxUnique = stations.reduce((m, s) => Math.max(m, s.unique), 0);
    const avg = stations.reduce((s, st) => s + st.unique, 0) / stations.length;
    stations.forEach(st => {
      const pct = maxUnique > 0 ? (st.unique / maxUnique * 100) : 0;
      const color = getSbalColor(st.unique, avg);
      const row = document.createElement('div');
      row.className = 'sbal-row';
      const name = escapeHtml(st.name || '(unnamed)');
      row.innerHTML = `
        <span class="sbal-name" title="${name}">${name}</span>
        <div class="sbal-track">
          <div class="sbal-fill" style="width:${Math.max(pct, 2)}%;background:${color}"></div>
        </div>
        <span class="sbal-count">${st.unique}</span>`;
      container.appendChild(row);
    });
  }

  function computeScanRate(timeline) {
    if (!timeline || timeline.length === 0) return { rate: 0, label: '' };
    // Use last 2 buckets (20 min) for recent rate
    const recent = timeline.slice(-2);
    const totalScans = recent.reduce((s, b) => s + b.scans, 0);
    const minutes = recent.length * 10;
    const rate = minutes > 0 ? totalScans / minutes : 0;
    return { rate, label: recent.length + ' intervals' };
  }

  function computeETA(remaining, ratePerMin) {
    if (remaining <= 0) return { value: 'Done', sub: 'All registered' };
    if (ratePerMin <= 0) return { value: '--', sub: 'No recent scans' };
    const mins = Math.ceil(remaining / ratePerMin);
    if (mins > 120) return { value: Math.round(mins / 60) + 'h', sub: remaining + ' remaining' };
    return { value: mins + 'min', sub: remaining + ' remaining' };
  }

  function update(data) {
    lastData = data;

    $('loadingScreen').style.display = 'none';
    $('dashboard').style.display = 'block';

    const totalReg = data.total_registered || 0;
    const uniqueBadges = data.unique_badges || 0;
    const rate = totalReg > 0 ? (uniqueBadges / totalReg * 100) : 0;
    const totalScans = data.total_scans || 0;

    $('heroRate').textContent = totalReg > 0 ? rate.toFixed(1) + '%' : '--';
    $('heroScanned').textContent = uniqueBadges.toLocaleString();
    $('heroTotalScans').textContent = totalScans.toLocaleString();
    $('heroRegistered').textContent = totalReg.toLocaleString();

    // Live stats: scan rate
    const sr = computeScanRate(data.timeline || []);
    $('scanRate').textContent = sr.rate > 0 ? sr.rate.toFixed(1) : '--';
    $('scanRate').classList.toggle('dim', sr.rate === 0);
    $('scanRateSub').textContent = totalScans > 0 ? totalScans + ' total' : '';

    // Live stats: ETA
    const remaining = Math.max(totalReg - uniqueBadges, 0);
    const eta = computeETA(remaining, sr.rate);
    $('etaValue').textContent = eta.value;
    $('etaValue').classList.toggle('dim', sr.rate === 0 && remaining > 0);
    $('etaSub').textContent = eta.sub;

    // Station balance
    const stations = data.stations || [];
    $('stationEmpty').style.display = stations.length ? 'none' : 'block';
    renderStationBalance($('stationBalance'), stations, uniqueBadges);

    // Business units — ring charts
    const bus = data.business_units || [];
    $('buCount').textContent = bus.length + (bus.length === 1 ? ' unit' : ' units');
    $('buEmpty').style.display = bus.length ? 'none' : 'block';
    renderRings($('buRings'), bus);

    // Footer
    const ts = data.timestamp ? new Date(data.timestamp) : new Date();
    $('footer').textContent = 'Last updated: ' + ts.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});

    isFirstLoad = false;
  }

  async function fetchData() {
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      consecutiveErrors = 0;
      $('statusDot').classList.remove('error');
      $('errorBanner').classList.remove('show');
      update(data);
    } catch (err) {
      consecutiveErrors++;
      $('statusDot').classList.add('error');
      if (lastData) {
        $('errorBanner').classList.add('show');
        $('errorText').textContent = 'Connection lost. Showing cached data.';
      } else if (!isFirstLoad) {
        $('loadingScreen').querySelector('.loading-text').textContent = 'Connection failed. Retrying...';
      }
      console.error('[Dashboard]', err);
    }
  }

  let stationTimer = null;

  function startTimer() {
    clearInterval(timer);
    if (POLL_INTERVAL === 0) {
      $('countdown').textContent = 'manual';
      return;
    }
    countdown = POLL_INTERVAL;
    timer = setInterval(() => {
      countdown--;
      $('countdown').textContent = countdown + 's';
      if (countdown <= 0) {
        fetchData();
        countdown = POLL_INTERVAL;
      }
    }, 1000);
  }

  function startStationTimer() {
    clearInterval(stationTimer);
    if (POLL_INTERVAL === 0) return;
    stationTimer = setInterval(fetchStationStatus, POLL_INTERVAL * 1000);
  }

  // Pause ALL polling when tab is hidden, resume + refresh on return
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      clearInterval(timer);
      clearInterval(stationTimer);
      if (POLL_INTERVAL > 0) $('countdown').textContent = 'paused';
    } else {
      fetchData();
      fetchStationStatus();
      startTimer();
      startStationTimer();
    }
  });

  // Station status
  const STATUS_API = '../v1/stations/status';

  async function fetchStationStatus() {
    try {
      const res = await fetch(STATUS_API);
      if (!res.ok) return;
      const data = await res.json();
      const stations = data.stations || [];
      stationStatusMap = {};
      stations.forEach(s => { stationStatusMap[s.station_name] = s; });
      // Re-render station balance with updated status
      if (lastData) {
        const stList = lastData.stations || [];
        const uniqueBadges = lastData.unique_badges || 0;
        renderStationBalance($('stationBalance'), stList, uniqueBadges);
      }
    } catch (e) { /* silent */ }
  }

  // ---- Pull to refresh ----
  var ptrStartY = 0, ptrActive = false, ptrRefreshing = false;
  var ptrEl = $('ptrIndicator');
  var PTR_THRESHOLD = 60;

  document.addEventListener('touchstart', function(e) {
    if (window.scrollY === 0 && !ptrRefreshing) {
      ptrStartY = e.touches[0].clientY;
      ptrActive = true;
    }
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!ptrActive || ptrRefreshing) return;
    var dy = e.touches[0].clientY - ptrStartY;
    if (dy < 0) { ptrActive = false; return; }
    var progress = Math.min(dy / PTR_THRESHOLD, 1);
    var translateY = -44 + (60 * progress);
    ptrEl.style.transform = 'translateX(-50%) translateY(' + translateY + 'px)';
    ptrEl.classList.toggle('visible', dy > 10);
    // Rotate arrow proportionally
    ptrEl.querySelector('svg').style.transform = 'rotate(' + (progress * 180) + 'deg)';
  }, { passive: true });

  document.addEventListener('touchend', function() {
    if (!ptrActive) return;
    ptrActive = false;
    var wasVisible = ptrEl.classList.contains('visible');
    var currentY = parseFloat(ptrEl.style.transform.split('translateY(')[1]) || -44;
    if (wasVisible && currentY >= 12) {
      // Trigger refresh
      ptrRefreshing = true;
      ptrEl.style.transform = 'translateX(-50%) translateY(16px)';
      ptrEl.classList.add('refreshing');
      ptrEl.querySelector('svg').style.transform = '';
      Promise.all([fetchData(), fetchStationStatus()]).then(function() {
        if (POLL_INTERVAL > 0) {
          countdown = POLL_INTERVAL;
          $('countdown').textContent = countdown + 's';
        }
      }).finally(function() {
        ptrRefreshing = false;
        ptrEl.classList.remove('refreshing', 'visible');
        ptrEl.style.transform = 'translateX(-50%) translateY(-44px)';
      });
    } else {
      ptrEl.classList.remove('visible');
      ptrEl.style.transform = 'translateX(-50%) translateY(-44px)';
      ptrEl.querySelector('svg').style.transform = '';
    }
  }, { passive: true });

  // Init: fetch config then start polling
  async function init() {
    try {
      const res = await fetch(CONFIG_URL);
      if (res.ok) {
        const cfg = await res.json();
        const val = parseInt(cfg.refresh_interval);
        if (val === 0 || (val >= 10 && val <= 600)) POLL_INTERVAL = val;
      }
    } catch (e) { /* use default */ }
    await fetchData();
    fetchStationStatus();
    startTimer();
    startStationTimer();
  }
  init();
})();
</script>
</body>
</html>
